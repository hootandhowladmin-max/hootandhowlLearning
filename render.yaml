services:
  - type: web
    name: hootandhowl-server
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server/server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_OPTIONS
        value: ""
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
    docker:
      dockerfile: ./Dockerfile
